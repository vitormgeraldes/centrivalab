<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120">

<defs>

<linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#6ec3ff"></stop>
<stop offset="100%" stop-color="#1f6feb"></stop>
</linearGradient>

<linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#e6e6e6"></stop>
<stop offset="100%" stop-color="#9fa7b0"></stop>
</linearGradient>

</defs>

<!-- vortex icon -->
<g transform="translate(70,60)">

<!-- swirl blades -->
<path d="M0,-38 C22,-38 38,-18 38,0 C38,20 18,38 0,38" fill="none" stroke="url(#blueGrad)" stroke-width="10" stroke-linecap="round"></path>

<path d="M0,38 C-22,38 -38,18 -38,0 C-38,-20 -18,-38 0,-38" fill="none" stroke="url(#metalGrad)" stroke-width="10" stroke-linecap="round"></path>

<path d="M-26,-18 C-10,-40 22,-40 34,-10" fill="none" stroke="url(#blueGrad)" stroke-width="8" stroke-linecap="round"></path>

<!-- membrane core -->
<circle cx="0" cy="0" r="6" fill="#0a2540"></circle>

</g>

<!-- text -->
<text x="140" y="60" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1f3c73">
CentrivaLab
</text>

<!-- tagline -->
<text x="140" y="88" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="20" fill="#2f7da1">
Centrifugal Membrane Screening
</text>

</svg>